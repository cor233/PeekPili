name: Sync to Gitee

on:
  push:
    branches: [ main ]          # 当 main 分支有推送时触发
  release:
    types: [ published ]        # 当 GitHub 上发布 Release 时触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # 获取完整历史，以便创建 orphan 分支

      - name: Setup Git user
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      # ---- 处理 main 分支（无历史记录） ----
      - name: Create squashed main branch
        run: |
          git checkout main
          git checkout --orphan temp-squash
          git add -A
          git commit -m "Squashed commit from GitHub main branch"
          git branch -D main
          git branch -m main

      # ---- 添加 Gitee 远程并强制推送 main 分支 ----
      - name: Push squashed main to Gitee
        run: |
          git remote add gitee https://cor233:${{ secrets.GITEE_TOKEN }}@gitee.com/cor233/PeekPili.git
          git push gitee main --force

      # ---- 推送所有标签到 Gitee ----
      - name: Push tags to Gitee
        run: git push gitee --tags --force

      # ---- 如果触发原因是 Release，则同步发行版元数据到 Gitee ----
      - name: Sync Release metadata to Gitee
        if: github.event_name == 'release'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GH_RELEASE: ${{ toJson(github.event.release) }}
        run: |
          TAG_NAME=$(echo "$GH_RELEASE" | jq -r '.tag_name')
          NAME=$(echo "$GH_RELEASE" | jq -r '.name')
          BODY=$(echo "$GH_RELEASE" | jq -r '.body')

          # 使用 Gitee API 创建发行版（如果已存在会失败，这里先尝试创建）
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{
                  \"access_token\": \"$GITEE_TOKEN\",
                  \"tag_name\": \"$TAG_NAME\",
                  \"name\": \"$NAME\",
                  \"body\": $(echo "$BODY" | jq -R -s '.'),  # 转义 JSON 字符串
                  \"target_commitish\": \"main\"
                }" \
            https://gitee.com/api/v5/repos/cor233/PeekPili/releases
