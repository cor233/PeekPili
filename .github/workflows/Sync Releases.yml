name: Sync Releases Daily

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO: ingriddaleusag-dotcom/PeekPiliRelease
      TARGET_REPO: cor233/PeekPili
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Fetch source release list (oldest first)
        run: |
          gh release list --repo $SOURCE_REPO --limit 1000 \
            --json tagName,name,createdAt --order asc > releases.json

      - name: Sync each release to target
        run: |
          jq -c '.[]' releases.json | while read item; do
            TAG_NAME=$(echo "$item" | jq -r '.tagName')
            RELEASE_NAME=$(echo "$item" | jq -r '.name')

            if gh release view "$TAG_NAME" --repo $TARGET_REPO > /dev/null 2>&1; then
              echo "Release $TAG_NAME already exists, skipping"
              continue
            fi

            if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              git fetch "https://github.com/$SOURCE_REPO.git" tag "$TAG_NAME" --no-tags
            fi

            if ! git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
              echo "Tag $TAG_NAME not found locally, skipping"
              continue
            fi

            gh release view "$TAG_NAME" --repo $SOURCE_REPO --json body,assets > detail.json
            BODY=$(jq -r '.body' detail.json)
            ASSETS=$(jq -c '.assets[]' detail.json)

            BODY_FILE="body_$(echo $TAG_NAME | tr / _).txt"
            echo "$BODY" > "$BODY_FILE"

            gh release create "$TAG_NAME" \
              --repo "$TARGET_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file "$BODY_FILE"
            rm -f "$BODY_FILE"
            sleep 3

            echo "$ASSETS" | while read asset; do
              if [ -z "$asset" ]; then continue; fi
              ASSET_NAME=$(echo "$asset" | jq -r '.name')
              ASSET_URL=$(echo "$asset" | jq -r '.url')
              curl -L -H "Accept: application/octet-stream" \
                "$ASSET_URL" --output "$ASSET_NAME"
              if [ -f "$ASSET_NAME" ]; then
                gh release upload "$TAG_NAME" "$ASSET_NAME" --repo "$TARGET_REPO" --clobber
                rm "$ASSET_NAME"
              fi
            done
            rm -f detail.json
            sleep 2
          done

      - name: Cleanup
        run: rm -f releases.json
