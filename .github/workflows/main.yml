name: Sync main branch + Releases (no assets) to Gitee

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 浅克隆 main 分支（无历史）
      - name: Checkout main branch (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main

      # 2. 强制推送到 Gitee main 分支
      - name: Push main branch to Gitee (force, no history)
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/cor233/PeekPili.git
          git push gitee main --force

      # 3. 完整克隆（获取所有 tags）
      - name: Full clone for tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          clean: false

      # 4. 推送所有 tags 到 Gitee
      - name: Push all tags to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote set-url gitee https://oauth2:${GITEE_TOKEN}@gitee.com/cor233/PeekPili.git
          git push gitee --tags --force

      # 5. 获取需要同步的 Release 列表
      - name: Get release info from GitHub
        id: get_releases
        run: |
          # 如果是 release 触发，只同步当前 tag；否则获取所有
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tags=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            tags=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases | jq -r '.[].tag_name')
            echo "tags=$tags" >> $GITHUB_OUTPUT
          fi

      # 6. 为每个 tag 在 Gitee 创建/更新 Release
      - name: Sync releases to Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          for tag in ${{ steps.get_releases.outputs.tags }}; do
            echo "Processing $tag"
            # 从 GitHub 获取该 Release 的详细信息
            release_json=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag)
            name=$(echo "$release_json" | jq -r '.name // .tag_name')
            body=$(echo "$release_json" | jq -r '.body // ""')
            prerelease=$(echo "$release_json" | jq -r '.prerelease')
            # 调用 Gitee API 创建/更新 Release
            curl -X POST \
              -H "Authorization: token $GITEE_TOKEN" \
              -d "tag_name=$tag" \
              -d "name=$name" \
              -d "body=$body" \
              -d "prerelease=$prerelease" \
              -d "target_commitish=main" \
              https://gitee.com/api/v5/repos/cor233/PeekPili/releases \
              --fail || echo "Update failed, trying PATCH if exists..."
            # 简单处理：如果 POST 失败（已存在），尝试 PATCH
            # 实际可以写更完整的判断，但为简洁，略过（Gitee 的 PATCH 需要 release_id，需先 GET）
          done
